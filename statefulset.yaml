apiVersion: v1
kind: Service
metadata:
  name: my-stateful-service
  namespace: lab1
  labels:
    app: my-stateful-app
spec:
  clusterIP: None
  selector:
    app: my-stateful-app
  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-stateful-app
  namespace: lab1
  labels:
    app: my-stateful-app
spec:
  serviceName: my-stateful-service
  replicas: 3
  selector:
    matchLabels:
      app: my-stateful-app
  template:
    metadata:
      labels:
        app: my-stateful-app
    spec:
      containers:
        - name: nginx
          image: drblaxk/toothiii-website:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
